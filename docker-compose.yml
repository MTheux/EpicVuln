version: '3.8'
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: vulncontrol_db
    environment:
      POSTGRES_USER: vulncontrol
      POSTGRES_PASSWORD: vulncontrol
      POSTGRES_DB: vulncontrol
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vulncontrol_backend
    ports:
      - "9001:9001"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://vulncontrol:vulncontrol@db:5432/vulncontrol
      - PORT=9001
      - SEED_ADMIN_PASSWORD=Admin@123
    volumes:
      - backend_data:/app/data
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Vazio para detecção dinâmica via window.location.hostname:9001
        - NEXT_PUBLIC_API_URL=
    container_name: vulncontrol_frontend
    ports:
      - "9000:9000"
    environment:
      - JWT_SECRET=your-secret-key-change-in-production
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  backend_data:
